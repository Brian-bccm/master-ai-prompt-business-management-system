<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BMS Dashboard</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body data-page="dashboard">
    <div class="app-shell">
        <aside class="sidebar"></aside>
        <main class="content">
            <header class="page-header"><div><p class="eyebrow">Admin Panel</p><h1>Dashboard</h1></div><button id="logoutBtn" class="secondary">Logout</button></header>
            <section class="metric-grid">
                <article><span>Daily Sales</span><strong id="dailySales">RM 0.00</strong></article>
                <article><span>Monthly Revenue</span><strong id="monthlyRevenue">RM 0.00</strong></article>
                <article><span>Products In Stock</span><strong id="productsInStock">0</strong></article>
                <article><span>Low Stock Alerts</span><strong id="lowStockCount">0</strong></article>
            </section>
            <section class="split">
                <div><h2>Top Selling Products</h2><div id="topProducts" class="list"></div></div>
                <div><h2>Stock Alerts</h2><div id="stockAlerts" class="list"></div></div>
            </section>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
