<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BMS Inventory</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body data-page="inventory">
    <div class="app-shell">
        <aside class="sidebar"></aside>
        <main class="content">
            <header class="page-header"><div><p class="eyebrow">Inventory</p><h1>Products</h1></div><button id="logoutBtn" class="secondary">Logout</button></header>
            <section class="toolbar"><input id="productSearch" placeholder="Search products or SKU"><button id="reloadProducts">Search</button></section>
            <section class="editor-grid">
                <form id="productForm" class="panel stack">
                    <h2>Add Product</h2>
                    <input id="productName" placeholder="Product name" required>
                    <input id="sku" placeholder="SKU" required>
                    <select id="categoryId"></select>
                    <select id="supplierId"></select>
                    <input id="costPrice" type="number" step="0.01" placeholder="Cost price" required>
                    <input id="sellingPrice" type="number" step="0.01" placeholder="Selling price" required>
                    <input id="stockQuantity" type="number" placeholder="Stock quantity" required>
                    <input id="lowStockThreshold" type="number" placeholder="Low stock threshold" value="5" required>
                    <button type="submit">Save Product</button>
                </form>
                <div class="panel table-wrap"><table><thead><tr><th>Name</th><th>SKU</th><th>Category</th><th>Stock</th><th>Price</th></tr></thead><tbody id="productsTable"></tbody></table></div>
            </section>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
